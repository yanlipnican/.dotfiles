customCommands:
  - key: 'o'
    context: 'worktrees'
    command: "~/.config/zellij/scripts/claude-worktree.sh {{.SelectedWorktree.Path | quote}} {{.SelectedWorktree.Name | quote}}"
    description: 'Open worktree in new zellij tab'
  - key: 'n'
    context: 'worktrees'
    prompts:
      - type: 'input'
        title: 'Branch name for new worktree:'
        key: 'BranchName'
    command: >-
      set PROJECT (basename (git rev-parse --show-toplevel)); and
      git worktree add "../worktrees/$PROJECT/{{.Form.BranchName}}" -b "{{.Form.BranchName}}"; and
      ~/.config/zellij/scripts/worktree.sh "../worktrees/$PROJECT/{{.Form.BranchName}}" "{{.Form.BranchName}}"
    description: 'Create worktree and open in zellij tab'
