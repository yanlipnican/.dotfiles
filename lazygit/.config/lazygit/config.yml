git:
  pull:
    mode: 'current-branch' # Only pull the current branch
  paging:
    colorArg: always
    pager: delta --dark --paging=never --syntax-theme="GitHub Dark Default"
gui:
  # GitHub Dark theme
  theme:
    activeBorderColor:
      - "#58a6ff"
      - bold
    inactiveBorderColor:
      - "#8b949e"
    optionsTextColor:
      - "#58a6ff"
    selectedLineBgColor:
      - "#21262d"
    cherryPickedCommitBgColor:
      - "#161b22"
    cherryPickedCommitFgColor:
      - "#58a6ff"
    unstagedChangesColor:
      - "#ff7b72"
    defaultFgColor:
      - "#e6edf3"
    searchingActiveBorderColor:
