# Font
font_family                 JetBrainsMono Nerd Font Regular
font_size                   13.0
text_composition_strategy   1.0 0

# macOS titlebar
macos_titlebar_color background
tab_bar_edge  top
tab_bar_style     powerline
tab_title_template "  {title}  "

# Layouts
enabled_layouts splits,stack

# Split keybindings
map cmd+d       launch --location=vsplit --cwd=current
map cmd+shift+d launch --location=hsplit --cwd=current
map cmd+w       close_window

# Move splits
map cmd+shift+h move_window left
map cmd+shift+j move_window down
map cmd+shift+k move_window up
map cmd+shift+l move_window right

# Remote control (enables kitty @ scripting)
allow_remote_control yes
listen_on        unix:/tmp/kitty.sock

# Window borders (splits divider)
active_border_color   #8b949e
inactive_border_color #21262d

# GitHub Dark Default
background            #0d1117
foreground            #8b949e
cursor                #e6edf3
cursor_text_color     #0d1117
selection_background  #264f78
selection_foreground  #e6edf3

